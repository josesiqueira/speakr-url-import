<!-- Upload Confirmation Modal (Provider Transparency) -->
<div v-if="showUploadConfirmation" @click.self="cancelUploadConfirmation" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
    <div class="bg-[var(--bg-secondary)] rounded-lg shadow-xl w-full max-w-md overflow-hidden">
        <div class="p-6 border-b border-[var(--border-primary)]">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <i class="fas fa-microchip text-2xl text-[var(--text-accent)]"></i>
                    <h3 class="text-lg font-semibold text-[var(--text-primary)]" v-text="t('upload.confirmTitle')"></h3>
                </div>
                <button @click="cancelUploadConfirmation" class="text-[var(--text-muted)] hover:text-[var(--text-primary)] transition-colors">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
        </div>
        <div class="p-6">
            <p class="text-sm text-[var(--text-secondary)] mb-4" v-text="t('upload.confirmMessage')"></p>
            <div class="inline-flex items-center px-3 py-1.5 text-sm font-medium rounded-full bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 border border-blue-200 dark:border-blue-700">
                <i class="fas fa-microchip mr-2" style="font-size: 10px;"></i>
                ${ activeConnectorDisplay }
            </div>
        </div>
        <div class="p-6 border-t border-[var(--border-primary)] bg-[var(--bg-tertiary)] rounded-b-lg">
            <div class="flex justify-end gap-3">
                <button @click="cancelUploadConfirmation"
                        class="px-5 py-2 text-[var(--text-secondary)] hover:bg-[var(--bg-secondary)] rounded-lg transition-colors border border-[var(--border-secondary)]">
                    ${ t('upload.confirmCancel') }
                </button>
                <button @click="acceptUploadConfirmation"
                        class="px-5 py-2 bg-[var(--bg-accent)] text-white rounded-lg hover:bg-[var(--bg-accent-hover)] transition-colors">
                    <i class="fas fa-check mr-2"></i>
                    ${ t('upload.confirmProceed') }
                </button>
            </div>
        </div>
    </div>
</div>
